<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LogisticsMaps</title>

  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <!-- SheetJS for Excel parsing -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0c10;
      --panel:   #111318;
      --border:  #1e2230;
      --accent:  #4af0a0;
      --accent2: #4ab4f0;
      --amber:   #f0c44a;
      --purple:  #b07af0;
      --text:    #e8ecf4;
      --muted:   #5a6278;
      --track:   #1e2230;
      --radius:  10px;
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: 'DM Mono', monospace; color: var(--text); }
    #map { position: absolute; inset: 0; }

    /* ── HEADER ── */
    #header {
      position: absolute; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; align-items: center;
      padding: 14px 24px;
      background: linear-gradient(to bottom, rgba(10,12,16,0.92) 0%, rgba(10,12,16,0) 100%);
      pointer-events: none;
    }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .tag { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-top: 2px; }

    /* ── PANEL ── */
    #panel {
      position: absolute; top: 70px; right: 20px; z-index: 10;
      width: 272px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }
    .panel-header {
      padding: 12px 16px; background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-header span { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent); }

    .section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .section:last-child { border-bottom: none; }
    .section-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }

    /* ── LAYER ROWS ── */
    .layer-row { margin-bottom: 12px; }
    .layer-row:last-child { margin-bottom: 0; }
    .layer-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }

    /* pill toggle */
    .pill { position: relative; width: 32px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .pill input { opacity: 0; width: 0; height: 0; position: absolute; }
    .pill-track { position: absolute; inset: 0; border-radius: 9px; background: var(--border); transition: background 0.2s; }
    .pill-thumb { position: absolute; top: 3px; left: 3px; width: 12px; height: 12px; border-radius: 50%; background: var(--muted); transition: transform 0.2s, background 0.2s; }
    .pill input:checked ~ .pill-track { background: rgba(74,240,160,0.25); }
    .pill input:checked ~ .pill-thumb { transform: translateX(14px); background: var(--accent); }

    .layer-name { font-size: 11px; color: var(--text); flex: 1; }

    /* mini buttons */
    .mini-toggle { display: flex; gap: 3px; }
    .mini-btn {
      padding: 2px 7px; font-size: 9px; letter-spacing: 1px;
      border: 1px solid var(--border); border-radius: 4px;
      background: transparent; color: var(--muted);
      font-family: 'DM Mono', monospace; cursor: pointer; transition: all 0.15s;
    }
    .mini-btn:hover { border-color: var(--accent2); color: var(--text); }
    .mini-btn.active { background: var(--accent2); border-color: var(--accent2); color: #0a0c10; }

    /* slider rows */
    .sl-row { display: flex; align-items: center; gap: 8px; padding-left: 40px; margin-bottom: 7px; }
    .sl-row:last-child { margin-bottom: 0; }
    .sl-row.no-indent { padding-left: 0; }
    .sl-label { font-size: 9px; color: var(--muted); min-width: 52px; }
    .sl-val   { font-size: 9px; min-width: 30px; text-align: right; color: var(--accent); }
    .sl-val.amber  { color: var(--amber); }
    .sl-val.purple { color: var(--purple); }

    input[type=range] {
      -webkit-appearance: none; flex: 1; height: 3px;
      background: var(--track); border-radius: 2px; outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 5px rgba(74,240,160,0.4); transition: transform 0.15s;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }
    input[type=range].blue::-webkit-slider-thumb   { background: var(--accent2); box-shadow: 0 0 5px rgba(74,180,240,0.4); }
    input[type=range].amber::-webkit-slider-thumb  { background: var(--amber);   box-shadow: 0 0 5px rgba(240,196,74,0.4); }
    input[type=range].purple::-webkit-slider-thumb { background: var(--purple);  box-shadow: 0 0 5px rgba(176,122,240,0.4); }

    /* camera */
    .cam-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .cam-row:last-child { margin-bottom: 0; }
    .cam-label { font-size: 10px; color: var(--muted); min-width: 64px; }
    .cam-val   { font-size: 10px; color: var(--accent2); min-width: 32px; text-align: right; }
    .reset-btn {
      flex: 1; padding: 6px; background: transparent; border: 1px solid var(--border);
      color: var(--muted); border-radius: 6px; font-family: 'DM Mono', monospace;
      font-size: 10px; cursor: pointer; letter-spacing: 1px; transition: all 0.15s;
    }
    .reset-btn:hover { border-color: var(--accent2); color: var(--text); }

    /* ── FILE UPLOAD ZONE ── */
    #upload-zone {
      border: 1px dashed var(--border); border-radius: 6px;
      padding: 12px; text-align: center; cursor: pointer;
      transition: all 0.2s; position: relative;
    }
    #upload-zone:hover, #upload-zone.drag-over {
      border-color: var(--accent); background: rgba(74,240,160,0.04);
    }
    #upload-zone input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .upload-icon { font-size: 18px; margin-bottom: 4px; }
    .upload-text { font-size: 10px; color: var(--muted); letter-spacing: 0.5px; }
    .upload-text strong { color: var(--accent); font-weight: 400; }

    /* file loaded state */
    #file-status {
      display: none; align-items: center; gap: 8px;
      background: rgba(74,240,160,0.06); border: 1px solid rgba(74,240,160,0.2);
      border-radius: 6px; padding: 8px 10px;
    }
    #file-status.visible { display: flex; }
    .file-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
    .file-name { font-size: 10px; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-clear {
      font-size: 14px; color: var(--muted); cursor: pointer; background: none; border: none;
      line-height: 1; padding: 0 2px; transition: color 0.15s;
    }
    .file-clear:hover { color: var(--text); }

    /* layer count badge */
    .count-badge {
      font-size: 9px; background: rgba(176,122,240,0.15); color: var(--purple);
      border: 1px solid rgba(176,122,240,0.3); border-radius: 10px;
      padding: 1px 7px; letter-spacing: 0.5px;
    }

    /* ── COORDS + ZOOM ── */
    #coords {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 10; background: rgba(10,12,16,0.85);
      border: 1px solid var(--border); border-radius: 20px;
      padding: 5px 14px; font-size: 10px; color: var(--muted);
      letter-spacing: 0.5px; pointer-events: none; backdrop-filter: blur(6px);
    }
    #zoom-badge {
      position: absolute; bottom: 20px; right: 20px; z-index: 10;
      background: rgba(10,12,16,0.85); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 12px;
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
      color: var(--text); pointer-events: none; backdrop-filter: blur(6px);
    }
    #zoom-badge span { color: var(--accent); }
  </style>
</head>
<body>

<div id="map"></div>

<div id="header">
  <div>
    <div class="logo">Logistics<span>Maps</span></div>
    <div class="tag">Visual Intelligence Platform</div>
  </div>
</div>

<div id="panel">
  <div class="panel-header">
    <span>Map Controls</span>
    <div class="dot"></div>
  </div>

  <!-- ── DATA ── -->
  <div class="section">
    <div class="section-label">Data</div>
    <div id="upload-zone">
      <input type="file" id="file-input" accept=".xlsx,.xls" onchange="onFileSelected(event)" />
      <div class="upload-icon">📂</div>
      <div class="upload-text">Drop Excel file or <strong>browse</strong></div>
    </div>
    <div id="file-status" style="margin-top:8px;">
      <div class="file-dot"></div>
      <span class="file-name" id="file-name-label">—</span>
      <button class="file-clear" onclick="clearFile()" title="Clear">✕</button>
    </div>
  </div>

  <!-- ── BACKGROUND LAYERS ── -->
  <div class="section">
    <div class="section-label">Background Layers</div>

    <!-- Vector -->
    <div class="layer-row">
      <div class="layer-top">
        <label class="pill">
          <input type="checkbox" id="tog-vector" checked onchange="onVectorToggle()" />
          <div class="pill-track"></div><div class="pill-thumb"></div>
        </label>
        <span class="layer-name">Vector</span>
        <div class="mini-toggle">
          <button class="mini-btn active" id="theme-dark"  onclick="setVectorTheme('dark')">DARK</button>
          <button class="mini-btn"        id="theme-light" onclick="setVectorTheme('light')">LIGHT</button>
        </div>
      </div>
      <div class="sl-row">
        <span class="sl-label">Opacity</span>
        <input type="range" id="sl-vec-op" min="0" max="100" value="100" oninput="onVectorOpacity(this.value)" />
        <span class="sl-val" id="val-vec-op">100%</span>
      </div>
    </div>

    <!-- Satellite -->
    <div class="layer-row">
      <div class="layer-top">
        <label class="pill">
          <input type="checkbox" id="tog-sat" onchange="onSatToggle()" />
          <div class="pill-track"></div><div class="pill-thumb"></div>
        </label>
        <span class="layer-name">Satellite</span>
      </div>
      <div class="sl-row">
        <span class="sl-label">Opacity</span>
        <input type="range" id="sl-sat-op" min="0" max="100" value="70" oninput="onSatOpacity(this.value)" />
        <span class="sl-val" id="val-sat-op">70%</span>
      </div>
      <div class="sl-row">
        <span class="sl-label">Saturation</span>
        <input type="range" class="amber" id="sl-sat-sat" min="0" max="100" value="100" oninput="onSatSaturation(this.value)" />
        <span class="sl-val amber" id="val-sat-sat">100%</span>
      </div>
    </div>
  </div>

  <!-- ── CIRCLES LAYER ── -->
  <div class="section">
    <div class="layer-top" style="margin-bottom:12px;">
      <label class="pill">
        <input type="checkbox" id="tog-circles" checked onchange="onCirclesToggle()" />
        <div class="pill-track"></div><div class="pill-thumb"></div>
      </label>
      <span class="layer-name" style="font-family:'Syne',sans-serif; font-size:10px; letter-spacing:1px; text-transform:uppercase;">Circles</span>
      <span class="count-badge" id="circles-count">0 items</span>
    </div>
    <div class="sl-row no-indent">
      <span class="sl-label">Opacity</span>
      <input type="range" class="purple" id="sl-circ-op" min="0" max="100" value="100" oninput="onCirclesOpacity(this.value)" />
      <span class="sl-val purple" id="val-circ-op">100%</span>
    </div>
    <div class="sl-row no-indent" style="margin-top:7px;">
      <span class="sl-label">Saturation</span>
      <input type="range" class="purple" id="sl-circ-sat" min="0" max="100" value="100" oninput="onCirclesSaturation(this.value)" />
      <span class="sl-val purple" id="val-circ-sat">100%</span>
    </div>
  </div>

  <!-- ── CAMERA ── -->
  <div class="section">
    <div class="section-label">Camera / 3D View</div>
    <div class="cam-row">
      <span class="cam-label">Pitch</span>
      <input type="range" class="blue" id="sl-pitch" min="0" max="85" value="0" oninput="updateCamera()" />
      <span class="cam-val" id="val-pitch">0°</span>
    </div>
    <div class="cam-row">
      <span class="cam-label">Bearing</span>
      <input type="range" class="blue" id="sl-bearing" min="-180" max="180" value="0" oninput="updateCamera()" />
      <span class="cam-val" id="val-bearing">0°</span>
    </div>
    <div class="cam-row">
      <span class="cam-label">Reset</span>
      <button class="reset-btn" onclick="resetCamera()">RESET CAMERA</button>
    </div>
  </div>

</div>

<div id="coords">— / —</div>
<div id="zoom-badge">zoom <span id="zoom-val">3.5</span></div>

<script>
  mapboxgl.accessToken = 'pk.eyJ1IjoibWF0dGlhc2JtIiwiYSI6ImNtb2NqcTdoYzAxa28ycHBlNDJjMnU5N2kifQ.qkqA4r5gtFbtSX3NlrKkPA';

  // ═══════════════════════════════════════════
  //  STATE
  // ═══════════════════════════════════════════
  const VECTOR_STYLES = {
    dark:  'mapbox://styles/mapbox/dark-v11',
    light: 'mapbox://styles/mapbox/light-v11'
  };

  let vectorTheme   = 'dark';
  let vectorVisible = true;
  let vectorOpacity = 1.0;
  let satVisible    = false;
  let satOpacity    = 0.7;
  let satSat        = 1.0;
  let styleReady    = false;

  // Circles master controls
  let circlesVisible = true;
  let circlesMasterOpacity = 1.0;
  let circlesMasterSat     = 1.0;

  // Raw circle data from Excel
  let circleData = [];

  // ═══════════════════════════════════════════
  //  MAP INIT
  // ═══════════════════════════════════════════
  const map = new mapboxgl.Map({
    container: 'map',
    style: VECTOR_STYLES.dark,
    center: [15, 52],
    zoom: 3.5,
    pitch: 0,
    bearing: 0,
    projection: 'mercator'
  });

  map.addControl(new mapboxgl.NavigationControl({ showCompass: true }), 'bottom-left');

  map.on('style.load', () => {
    styleReady = true;
    ensureSatLayer();
    applyMapLayers();
    renderCircles();
  });

  // ═══════════════════════════════════════════
  //  BACKGROUND LAYERS
  // ═══════════════════════════════════════════
  function ensureSatLayer() {
    if (!map.getSource('sat-src')) {
      map.addSource('sat-src', { type: 'raster', url: 'mapbox://mapbox.satellite', tileSize: 256 });
    }
    if (!map.getLayer('sat-layer')) {
      map.addLayer({ id: 'sat-layer', type: 'raster', source: 'sat-src',
        paint: { 'raster-opacity': 0, 'raster-saturation': 0 } });
    }
  }

  function applyMapLayers() {
    if (!styleReady) return;
    try {
      map.setPaintProperty('sat-layer', 'raster-opacity', satVisible ? satOpacity : 0);
      map.setPaintProperty('sat-layer', 'raster-saturation', satSat - 1.0);
    } catch(e) {}
    const t = vectorVisible ? vectorOpacity : 0;
    map.getStyle().layers.forEach(layer => {
      if (layer.id === 'sat-layer' || layer.id === 'circles-layer') return;
      try {
        const lt = layer.type;
        if (lt === 'background') map.setPaintProperty(layer.id, 'background-opacity', t);
        if (lt === 'fill')       map.setPaintProperty(layer.id, 'fill-opacity',       t);
        if (lt === 'line')       map.setPaintProperty(layer.id, 'line-opacity',       t);
        if (lt === 'circle')     map.setPaintProperty(layer.id, 'circle-opacity',     t);
        if (lt === 'raster')     map.setPaintProperty(layer.id, 'raster-opacity',     t);
        if (lt === 'symbol') {
          map.setPaintProperty(layer.id, 'icon-opacity', t);
          map.setPaintProperty(layer.id, 'text-opacity', t);
        }
      } catch(e) {}
    });
  }

  function onVectorToggle()   { vectorVisible = document.getElementById('tog-vector').checked; applyMapLayers(); }
  function onVectorOpacity(v) { vectorOpacity = v/100; document.getElementById('val-vec-op').textContent = v+'%'; applyMapLayers(); }
  function setVectorTheme(theme) {
    if (vectorTheme === theme) return;
    vectorTheme = theme;
    document.getElementById('theme-dark').classList.toggle('active',  theme === 'dark');
    document.getElementById('theme-light').classList.toggle('active', theme === 'light');
    styleReady = false;
    map.setStyle(VECTOR_STYLES[theme]);
    map.once('style.load', () => { styleReady = true; ensureSatLayer(); applyMapLayers(); renderCircles(); });
  }
  function onSatToggle()      { satVisible = document.getElementById('tog-sat').checked; applyMapLayers(); }
  function onSatOpacity(v)    { satOpacity = v/100; document.getElementById('val-sat-op').textContent  = v+'%'; applyMapLayers(); }
  function onSatSaturation(v) { satSat     = v/100; document.getElementById('val-sat-sat').textContent = v+'%'; applyMapLayers(); }

  // ═══════════════════════════════════════════
  //  FILE UPLOAD
  // ═══════════════════════════════════════════
  const uploadZone = document.getElementById('upload-zone');
  uploadZone.addEventListener('dragover',  e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault(); uploadZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) processFile(file);
  });

  function onFileSelected(e) {
    const file = e.target.files[0];
    if (file) processFile(file);
  }

  function processFile(file) {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array' });

        // Parse Circles sheet
        circleData = [];
        const circleSheet = wb.Sheets['Circles'];
        if (circleSheet) {
          const rows = XLSX.utils.sheet_to_json(circleSheet);
          circleData = rows.map(r => ({
            name:         r['Name']               || '',
            type:         parseInt(r['Type (0 = Ellipse, 1 = Rectangle)']) || 0,
            lng:          parseFloat(r['Longitude'])      || 0,
            lat:          parseFloat(r['Latitude'])       || 0,
            opacity:      parseInt(r['Opacity (0-255)'])  ?? 170,
            r:            parseInt(r['Red Color (0-255)'])   || 0,
            g:            parseInt(r['Green Color (0-255)']) || 0,
            b:            parseInt(r['Blue Color (0-255)'])  || 0,
            height:       parseInt(r['Height pixels'])    || 20,
            width:        parseInt(r['Width pixels'])     || 20,
            border:       parseInt(r['Border (On = 1, Off = 0, Bevel = 2)']) || 0,
            borderSize:   parseInt(r['Border Size pixels (for bevel=%)']) || 1,
            antialias:    parseInt(r['Antialiasing (On = 1, Off = 0)']) || 0,
          })).filter(d => !isNaN(d.lng) && !isNaN(d.lat));
        }

        // Update UI
        document.getElementById('file-name-label').textContent = file.name;
        document.getElementById('file-status').classList.add('visible');
        document.getElementById('circles-count').textContent = circleData.length + ' items';

        renderCircles();
      } catch(err) {
        alert('Could not read Excel file: ' + err.message);
      }
    };
    reader.readAsArrayBuffer(file);
  }

  function clearFile() {
    circleData = [];
    document.getElementById('file-input').value = '';
    document.getElementById('file-status').classList.remove('visible');
    document.getElementById('circles-count').textContent = '0 items';
    renderCircles();
  }

  // ═══════════════════════════════════════════
  //  CIRCLES RENDERING  (canvas markers)
  // ═══════════════════════════════════════════

  let circleMarkers = [];

  function desaturateRGB(r, g, b, sat) {
    const grey = 0.299 * r + 0.587 * g + 0.114 * b;
    return [
      Math.round(grey + (r - grey) * sat),
      Math.round(grey + (g - grey) * sat),
      Math.round(grey + (b - grey) * sat)
    ];
  }

  function drawCircleCanvas(d, masterOpacity, masterSat) {
    const [fr, fg, fb] = desaturateRGB(d.r, d.g, d.b, masterSat);
    const fillOpacity   = (d.opacity / 255) * masterOpacity;
    const borderOpacity = masterOpacity;
    const radius = (d.height + d.width) / 4;
    const pad    = d.border === 1 ? Math.max(d.borderSize, 2) + 1
                 : d.border === 2 ? Math.ceil(radius * 0.35) + 4
                 : 2;
    const size   = Math.ceil((radius + pad) * 2);
    const cx     = size / 2;

    const canvas = document.createElement('canvas');
    canvas.width  = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');

    if (d.border === 2) {
      // GLOSSY ORB — fixed recipe: drop shadow + shaded sphere + specular highlight + rim
      // borderSize is ignored for bevel; the look is intentionally consistent.

      // ── 1. DROP SHADOW ── soft blurred shadow below-right of the orb
      ctx.save();
      ctx.shadowColor   = `rgba(0,0,0,${fillOpacity * 0.55})`;
      ctx.shadowBlur    = radius * 0.45;
      ctx.shadowOffsetX = radius * 0.08;
      ctx.shadowOffsetY = radius * 0.14;
      ctx.beginPath();
      ctx.arc(cx, cx, radius * 0.98, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(0,0,0,${fillOpacity * 0.7})`;
      ctx.fill();
      ctx.restore();

      // ── 2. SPHERE BODY ── radial gradient: lit top-left → base → dark bottom-right
      // Highlight tone (brighter version of fill)
      const hR = Math.min(255, fr + 90);
      const hG = Math.min(255, fg + 90);
      const hB = Math.min(255, fb + 90);
      // Dark tone (deep shadow side)
      const dR = Math.round(fr * 0.25);
      const dG = Math.round(fg * 0.25);
      const dB = Math.round(fb * 0.25);

      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cx, radius, 0, Math.PI * 2);
      ctx.clip();

      const bodyGrad = ctx.createRadialGradient(
        cx - radius * 0.35, cx - radius * 0.35, radius * 0.05,
        cx + radius * 0.15, cx + radius * 0.15, radius * 1.15
      );
      bodyGrad.addColorStop(0.00, `rgba(${hR},${hG},${hB},${fillOpacity})`);
      bodyGrad.addColorStop(0.45, `rgba(${fr},${fg},${fb},${fillOpacity})`);
      bodyGrad.addColorStop(1.00, `rgba(${dR},${dG},${dB},${fillOpacity})`);
      ctx.fillStyle = bodyGrad;
      ctx.fillRect(cx - radius, cx - radius, radius * 2, radius * 2);

      // ── 3. SPECULAR HIGHLIGHT ── bright elongated oval, top-left
      const hlCX = cx - radius * 0.32;
      const hlCY = cx - radius * 0.42;
      const hlRX = radius * 0.40;
      const hlRY = radius * 0.22;
      const hlGrad = ctx.createRadialGradient(hlCX, hlCY, 0, hlCX, hlCY, hlRX);
      hlGrad.addColorStop(0.0, `rgba(255,255,255,${fillOpacity * 0.95})`);
      hlGrad.addColorStop(0.5, `rgba(255,255,255,${fillOpacity * 0.35})`);
      hlGrad.addColorStop(1.0, `rgba(255,255,255,0)`);
      ctx.fillStyle = hlGrad;
      ctx.beginPath();
      ctx.ellipse(hlCX, hlCY, hlRX, hlRY, -Math.PI / 5, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();

      // ── 4. RIM OUTLINE ── thin dark edge all the way around
      ctx.beginPath();
      ctx.arc(cx, cx, radius - 0.5, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(0,0,0,${borderOpacity * 0.55})`;
      ctx.lineWidth   = 1;
      ctx.stroke();
    } else {
      // PLAIN FILL
      ctx.beginPath();
      ctx.arc(cx, cx, radius, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${fr},${fg},${fb},${fillOpacity})`;
      ctx.fill();
      if (d.border === 1) {
        // SOLID BORDER — drawn inside radius, perfectly centred
        ctx.beginPath();
        ctx.arc(cx, cx, radius - d.borderSize / 2, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(0,0,0,${borderOpacity})`;
        ctx.lineWidth   = d.borderSize;
        ctx.stroke();
      }
    }
    return canvas;
  }

  function clearCircleMarkers() {
    circleMarkers.forEach(m => m.remove());
    circleMarkers = [];
  }

  function renderCircles() {
    clearCircleMarkers();
    if (!circlesVisible || circleData.length === 0) return;

    circleData.forEach(d => {
      const canvas = drawCircleCanvas(d, circlesMasterOpacity, circlesMasterSat);
      canvas.style.display    = 'block';
      canvas.style.marginLeft = `-${canvas.width  / 2}px`;
      canvas.style.marginTop  = `-${canvas.height / 2}px`;
      canvas.style.cursor     = 'pointer';

      canvas.addEventListener('mouseenter', () => {
        tooltip.style.display = 'block';
        tooltip.textContent   = d.name;
      });
      canvas.addEventListener('mousemove', e => {
        tooltip.style.left = (e.clientX + 12) + 'px';
        tooltip.style.top  = (e.clientY  - 28) + 'px';
      });
      canvas.addEventListener('mouseleave', () => {
        tooltip.style.display = 'none';
      });

      const marker = new mapboxgl.Marker({ element: canvas, anchor: 'center' })
        .setLngLat([d.lng, d.lat])
        .addTo(map);
      circleMarkers.push(marker);
    });
  }

  function updateCircleAppearance() {
    circleMarkers.forEach((marker, i) => {
      const d      = circleData[i];
      const canvas = marker.getElement();
      const ctx    = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const fresh  = drawCircleCanvas(d, circlesMasterOpacity, circlesMasterSat);
      ctx.drawImage(fresh, 0, 0);
    });
  }

  function onCirclesToggle() {
    circlesVisible = document.getElementById('tog-circles').checked;
    renderCircles();
  }
  function onCirclesOpacity(v) {
    circlesMasterOpacity = v / 100;
    document.getElementById('val-circ-op').textContent = v + '%';
    updateCircleAppearance();
  }
  function onCirclesSaturation(v) {
    circlesMasterSat = v / 100;
    document.getElementById('val-circ-sat').textContent = v + '%';
    updateCircleAppearance();
  }

  // ═══════════════════════════════════════════
  //  TOOLTIP
  // ═══════════════════════════════════════════
  const tooltip = document.createElement('div');
  Object.assign(tooltip.style, {
    position: 'fixed', display: 'none', pointerEvents: 'none',
    background: 'rgba(10,12,16,0.9)', border: '1px solid #1e2230',
    color: '#e8ecf4', fontFamily: "'DM Mono', monospace",
    fontSize: '11px', padding: '4px 10px', borderRadius: '5px',
    letterSpacing: '0.3px', zIndex: '20', whiteSpace: 'nowrap'
  });
  document.body.appendChild(tooltip);

  // ═══════════════════════════════════════════
  //  CAMERA
  // ═══════════════════════════════════════════
  function updateCamera() {
    const pitch   = parseFloat(document.getElementById('sl-pitch').value);
    const bearing = parseFloat(document.getElementById('sl-bearing').value);
    document.getElementById('val-pitch').textContent   = pitch   + '°';
    document.getElementById('val-bearing').textContent = bearing + '°';
    map.easeTo({ pitch, bearing, duration: 300 });
  }
  function resetCamera() {
    document.getElementById('sl-pitch').value   = 0;
    document.getElementById('sl-bearing').value = 0;
    document.getElementById('val-pitch').textContent   = '0°';
    document.getElementById('val-bearing').textContent = '0°';
    map.easeTo({ pitch: 0, bearing: 0, duration: 400 });
  }

  // ═══════════════════════════════════════════
  //  COORDS + ZOOM
  // ═══════════════════════════════════════════
  map.on('mousemove', e => {
    const {lng, lat} = e.lngLat;
    document.getElementById('coords').textContent =
      lat.toFixed(4) + '° N   ' + lng.toFixed(4) + '° E';
  });
  map.on('zoom', () => {
    document.getElementById('zoom-val').textContent = map.getZoom().toFixed(1);
  });
</script>
</body>
</html>
