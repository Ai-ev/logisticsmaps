<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LogisticsMaps</title>

  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0c10;
      --panel:   #111318;
      --border:  #1e2230;
      --accent:  #4af0a0;
      --accent2: #4ab4f0;
      --amber:   #f0c44a;
      --text:    #e8ecf4;
      --muted:   #5a6278;
      --track:   #1e2230;
      --radius:  10px;
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: 'DM Mono', monospace; color: var(--text); }
    #map { position: absolute; inset: 0; }

    /* ── HEADER ── */
    #header {
      position: absolute; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; align-items: center;
      padding: 14px 24px;
      background: linear-gradient(to bottom, rgba(10,12,16,0.92) 0%, rgba(10,12,16,0) 100%);
      pointer-events: none;
    }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .tag { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-top: 2px; }

    /* ── PANEL ── */
    #panel {
      position: absolute; top: 70px; right: 20px; z-index: 10;
      width: 272px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }
    .panel-header {
      padding: 12px 16px; background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-header span { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent); }

    .section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .section:last-child { border-bottom: none; }
    .section-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }

    /* ── LAYER ROWS ── */
    .layer-row { margin-bottom: 12px; }
    .layer-row:last-child { margin-bottom: 0; }
    .layer-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }

    /* pill */
    .pill { position: relative; width: 32px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .pill input { opacity: 0; width: 0; height: 0; position: absolute; }
    .pill-track { position: absolute; inset: 0; border-radius: 9px; background: var(--border); transition: background 0.2s; }
    .pill-thumb { position: absolute; top: 3px; left: 3px; width: 12px; height: 12px; border-radius: 50%; background: var(--muted); transition: transform 0.2s, background 0.2s; }
    .pill input:checked ~ .pill-track { background: rgba(74,240,160,0.25); }
    .pill input:checked ~ .pill-thumb { transform: translateX(14px); background: var(--accent); }

    .layer-name { font-size: 11px; color: var(--text); flex: 1; }

    /* mini buttons */
    .mini-toggle { display: flex; gap: 3px; }
    .mini-btn {
      padding: 2px 7px; font-size: 9px; letter-spacing: 1px;
      border: 1px solid var(--border); border-radius: 4px;
      background: transparent; color: var(--muted);
      font-family: 'DM Mono', monospace; cursor: pointer; transition: all 0.15s;
    }
    .mini-btn:hover { border-color: var(--accent2); color: var(--text); }
    .mini-btn.active { background: var(--accent2); border-color: var(--accent2); color: #0a0c10; }

    /* slider rows */
    .sl-row { display: flex; align-items: center; gap: 8px; padding-left: 40px; margin-bottom: 7px; }
    .sl-row:last-child { margin-bottom: 0; }
    .sl-label { font-size: 9px; color: var(--muted); min-width: 52px; }
    .sl-val   { font-size: 9px; min-width: 30px; text-align: right; color: var(--accent); }
    .sl-val.amber { color: var(--amber); }

    input[type=range] {
      -webkit-appearance: none; flex: 1; height: 3px;
      background: var(--track); border-radius: 2px; outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 5px rgba(74,240,160,0.4); transition: transform 0.15s;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }
    input[type=range].blue::-webkit-slider-thumb   { background: var(--accent2); box-shadow: 0 0 5px rgba(74,180,240,0.4); }
    input[type=range].amber::-webkit-slider-thumb  { background: var(--amber);   box-shadow: 0 0 5px rgba(240,196,74,0.4); }

    /* camera section reuses sl-row style */
    .cam-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .cam-row:last-child { margin-bottom: 0; }
    .cam-label { font-size: 10px; color: var(--muted); min-width: 64px; }
    .cam-val   { font-size: 10px; color: var(--accent2); min-width: 32px; text-align: right; }

    .reset-btn {
      flex: 1; padding: 6px; background: transparent; border: 1px solid var(--border);
      color: var(--muted); border-radius: 6px; font-family: 'DM Mono', monospace;
      font-size: 10px; cursor: pointer; letter-spacing: 1px; transition: all 0.15s;
    }
    .reset-btn:hover { border-color: var(--accent2); color: var(--text); }

    /* ── FOOT BADGES ── */
    #coords {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 10; background: rgba(10,12,16,0.85);
      border: 1px solid var(--border); border-radius: 20px;
      padding: 5px 14px; font-size: 10px; color: var(--muted);
      letter-spacing: 0.5px; pointer-events: none; backdrop-filter: blur(6px);
    }
    #zoom-badge {
      position: absolute; bottom: 20px; right: 20px; z-index: 10;
      background: rgba(10,12,16,0.85); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 12px;
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
      color: var(--text); pointer-events: none; backdrop-filter: blur(6px);
    }
    #zoom-badge span { color: var(--accent); }
  </style>
</head>
<body>

<div id="map"></div>

<div id="header">
  <div>
    <div class="logo">Logistics<span>Maps</span></div>
    <div class="tag">Visual Intelligence Platform</div>
  </div>
</div>

<div id="panel">
  <div class="panel-header">
    <span>Map Controls</span>
    <div class="dot"></div>
  </div>

  <!-- BACKGROUND LAYERS -->
  <div class="section">
    <div class="section-label">Background Layers</div>

    <!-- Vector -->
    <div class="layer-row">
      <div class="layer-top">
        <label class="pill">
          <input type="checkbox" id="tog-vector" checked onchange="onVectorToggle()" />
          <div class="pill-track"></div><div class="pill-thumb"></div>
        </label>
        <span class="layer-name">Vector</span>
        <div class="mini-toggle">
          <button class="mini-btn active" id="theme-dark"  onclick="setVectorTheme('dark')">DARK</button>
          <button class="mini-btn"        id="theme-light" onclick="setVectorTheme('light')">LIGHT</button>
        </div>
      </div>
      <div class="sl-row">
        <span class="sl-label">Opacity</span>
        <input type="range" id="sl-vec-op" min="0" max="100" value="100" oninput="onVectorOpacity(this.value)" />
        <span class="sl-val" id="val-vec-op">100%</span>
      </div>
    </div>

    <!-- Satellite -->
    <div class="layer-row">
      <div class="layer-top">
        <label class="pill">
          <input type="checkbox" id="tog-sat" onchange="onSatToggle()" />
          <div class="pill-track"></div><div class="pill-thumb"></div>
        </label>
        <span class="layer-name">Satellite</span>
      </div>
      <div class="sl-row">
        <span class="sl-label">Opacity</span>
        <input type="range" id="sl-sat-op" min="0" max="100" value="70" oninput="onSatOpacity(this.value)" />
        <span class="sl-val" id="val-sat-op">70%</span>
      </div>
      <div class="sl-row">
        <span class="sl-label">Saturation</span>
        <input type="range" class="amber" id="sl-sat-sat" min="0" max="100" value="100" oninput="onSatSaturation(this.value)" />
        <span class="sl-val amber" id="val-sat-sat">100%</span>
      </div>
    </div>

  </div>

  <!-- CAMERA -->
  <div class="section">
    <div class="section-label">Camera / 3D View</div>
    <div class="cam-row">
      <span class="cam-label">Pitch</span>
      <input type="range" class="blue" id="sl-pitch" min="0" max="85" value="0" oninput="updateCamera()" />
      <span class="cam-val" id="val-pitch">0°</span>
    </div>
    <div class="cam-row">
      <span class="cam-label">Bearing</span>
      <input type="range" class="blue" id="sl-bearing" min="-180" max="180" value="0" oninput="updateCamera()" />
      <span class="cam-val" id="val-bearing">0°</span>
    </div>
    <div class="cam-row">
      <span class="cam-label">Reset</span>
      <button class="reset-btn" onclick="resetCamera()">RESET CAMERA</button>
    </div>
  </div>

</div>

<div id="coords">— / —</div>
<div id="zoom-badge">zoom <span id="zoom-val">3.5</span></div>

<script>
  mapboxgl.accessToken = 'pk.eyJ1IjoibWF0dGlhc2JtIiwiYSI6ImNtb2NqcTdoYzAxa28ycHBlNDJjMnU5N2kifQ.qkqA4r5gtFbtSX3NlrKkPA';

  const VECTOR_STYLES = {
    dark:  'mapbox://styles/mapbox/dark-v11',
    light: 'mapbox://styles/mapbox/light-v11'
  };

  let vectorTheme   = 'dark';
  let vectorVisible = true;
  let vectorOpacity = 1.0;
  let satVisible    = false;
  let satOpacity    = 0.7;
  let satSat        = 1.0;   // 1 = full colour, 0 = greyscale
  let styleReady    = false;

  const map = new mapboxgl.Map({
    container: 'map',
    style: VECTOR_STYLES.dark,
    center: [15, 52],
    zoom: 3.5,
    pitch: 0,
    bearing: 0,
    projection: 'mercator'
  });

  map.addControl(new mapboxgl.NavigationControl({ showCompass: true }), 'bottom-left');

  map.on('style.load', () => {
    styleReady = true;
    ensureSatLayer();
    applyAll();
  });

  // ── Satellite layer — added LAST so it sits on top of all vector layers ──
  function ensureSatLayer() {
    if (!map.getSource('sat-src')) {
      map.addSource('sat-src', {
        type: 'raster',
        url: 'mapbox://mapbox.satellite',
        tileSize: 256
      });
    }
    if (!map.getLayer('sat-layer')) {
      // No insertion point = appended on top of everything
      map.addLayer({
        id: 'sat-layer',
        type: 'raster',
        source: 'sat-src',
        paint: { 'raster-opacity': 0, 'raster-saturation': 0 }
      });
    }
  }

  function applyAll() {
    if (!styleReady) return;

    // Satellite
    try {
      map.setPaintProperty('sat-layer', 'raster-opacity',
        satVisible ? satOpacity : 0);
      // raster-saturation: -1 = greyscale, 0 = unchanged
      map.setPaintProperty('sat-layer', 'raster-saturation', satSat - 1.0);
    } catch(e) {}

    // Vector — apply opacity to every non-satellite layer
    const t = vectorVisible ? vectorOpacity : 0;
    map.getStyle().layers.forEach(layer => {
      if (layer.id === 'sat-layer') return;
      try {
        const lt = layer.type;
        if (lt === 'background') map.setPaintProperty(layer.id, 'background-opacity', t);
        if (lt === 'fill')       map.setPaintProperty(layer.id, 'fill-opacity',       t);
        if (lt === 'line')       map.setPaintProperty(layer.id, 'line-opacity',       t);
        if (lt === 'circle')     map.setPaintProperty(layer.id, 'circle-opacity',     t);
        if (lt === 'raster')     map.setPaintProperty(layer.id, 'raster-opacity',     t);
        if (lt === 'symbol') {
          map.setPaintProperty(layer.id, 'icon-opacity', t);
          map.setPaintProperty(layer.id, 'text-opacity', t);
        }
      } catch(e) {}
    });
  }

  // ── Handlers ──
  function onVectorToggle()   { vectorVisible = document.getElementById('tog-vector').checked; applyAll(); }
  function onVectorOpacity(v) { vectorOpacity = v/100; document.getElementById('val-vec-op').textContent = v+'%'; applyAll(); }

  function setVectorTheme(theme) {
    if (vectorTheme === theme) return;
    vectorTheme = theme;
    document.getElementById('theme-dark').classList.toggle('active',  theme === 'dark');
    document.getElementById('theme-light').classList.toggle('active', theme === 'light');
    styleReady = false;
    map.setStyle(VECTOR_STYLES[theme]);
    map.once('style.load', () => { styleReady = true; ensureSatLayer(); applyAll(); });
  }

  function onSatToggle()       { satVisible = document.getElementById('tog-sat').checked; applyAll(); }
  function onSatOpacity(v)     { satOpacity = v/100; document.getElementById('val-sat-op').textContent  = v+'%'; applyAll(); }
  function onSatSaturation(v)  { satSat     = v/100; document.getElementById('val-sat-sat').textContent = v+'%'; applyAll(); }

  // ── Camera ──
  function updateCamera() {
    const pitch   = parseFloat(document.getElementById('sl-pitch').value);
    const bearing = parseFloat(document.getElementById('sl-bearing').value);
    document.getElementById('val-pitch').textContent   = pitch   + '°';
    document.getElementById('val-bearing').textContent = bearing + '°';
    map.easeTo({ pitch, bearing, duration: 300 });
  }
  function resetCamera() {
    document.getElementById('sl-pitch').value   = 0;
    document.getElementById('sl-bearing').value = 0;
    document.getElementById('val-pitch').textContent   = '0°';
    document.getElementById('val-bearing').textContent = '0°';
    map.easeTo({ pitch: 0, bearing: 0, duration: 400 });
  }

  // ── Coords + zoom ──
  map.on('mousemove', e => {
    const {lng, lat} = e.lngLat;
    document.getElementById('coords').textContent =
      lat.toFixed(4) + '° N   ' + lng.toFixed(4) + '° E';
  });
  map.on('zoom', () => {
    document.getElementById('zoom-val').textContent = map.getZoom().toFixed(1);
  });
</script>
</body>
</html>
